<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el amor de mi vida 💖</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 75, 110, 0.2);
            max-width: 400px;
            width: 90%;
            position: relative;
            z-index: 10;
        }
        h2 {
            color: #ff477e;
            font-size: 22px;
            margin-bottom: 25px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn-yes {
            background-color: #ff477e;
            color: white;
        }
        .btn-yes:hover {
            transform: scale(1.1);
        }
        .btn-no {
            background-color: #ffb3c1;
            color: white;
        }
        .btn-no:hover {
            transform: scale(1.1);
        }
        .final-message {
            display: none;
            color: #ff477e;
        }
        .final-message p {
            font-size: 18px;
            line-height: 1.5;
            color: #ff7096;
        }
        .decorations {
            font-size: 40px;
            margin: 10px 0;
        }
        .btn-send {
            background-color: #25D366;
            color: white;
            margin-top: 20px;
        }
        .heart {
            position: absolute;
            color: #ff7096;
            opacity: 0.6;
            animation: float 4s linear infinite;
            z-index: 1;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="quiz-section">
            <div class="decorations">🌹✨💝</div>
            <h2 id="question-text">Pregunta 1: ¿Me amas con todo tu corazón?</h2>
            <div class="buttons">
                <button class="btn-yes" onclick="saveAnswer('Sí')">SÍ 💖</button>
                <button class="btn-no" onclick="saveAnswer('No')">NO 💔</button>
            </div>
        </div>

        <div id="final-section" class="final-message">
            <div class="decorations">🌹💖✨👑✨💖🌹</div>
            <p><strong>te amo mucho mi amor eres muy linda y te amo con todo mi carazon, besitos te amo amomo</strong></p>
            <div class="decorations">💋💋💋</div>
            <button class="btn-send" onclick="sendToWhatsApp()">Enviar mis respuestas 💬</button>
        </div>
    </div>

    <script>
        // Recuerda cambiar esto por tu número (ejemplo: 50688888888 sin el signo +)
        const TELEFONO = "50671346025"; 

        const questions = [
            "Pregunta 1: ¿Me amas con todo tu corazón?",
            "Pregunta 2: ¿Crees que somos el uno para el otro?",
            "Pregunta 3: ¿Me extrañas cuando no estamos hablando?",
            "Pregunta 4: ¿Te gusta cuando me pongo tierno contigo?",
            "Pregunta 5: ¿Quieres que estemos juntos por muchísimo tiempo?"
        ];

        let currentQuestionIndex = 0;
        let userAnswers = [];

        function saveAnswer(answer) {
            userAnswers.push(`P${currentQuestionIndex + 1}: ${answer}`);
            currentQuestionIndex++;

            if (currentQuestionIndex < questions.length) {
                document.getElementById('question-text').innerText = questions[currentQuestionIndex];
                createHeart();
            } else {
                document.getElementById('quiz-section').style.display = 'none';
                document.getElementById('final-section').style.display = 'block';
                for(let i=0; i<20; i++) { setTimeout(createHeart, i * 150); }
            }
        }

        function sendToWhatsApp() {
            let textoRespuestas = userAnswers.join("\n");
            let mensajeCompleto = `¡Hola mi amor! Ya respondí tus preguntas: \n\n${textoRespuestas}\n\n¡Te amo mucho! 💖`;
            let url = `https://api.whatsapp.com/send?phone=${TELEFONO}&text=${encodeURIComponent(mensajeCompleto)}`;
            window.open(url, '_blank');
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const icons = ['❤️', '💖', '🌹', '✨'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            heart.style.fontSize = (Math.random() * 15 + 20) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 4000);
        }

        setInterval(createHeart, 900);
    </script>

</body>
</html>
